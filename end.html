<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sink OS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #b8cef8 0%, #c5d8fb 20%, #d8e8ff 40%, #cfe0ff 60%, #b9ccf5 80%, #a8bef0 100%);
      text-align: center;
      padding: 2rem;
    }
    .main-text {
      font-size: 22px;
      font-weight: 600;
      color: #1c2d54;
      margin-bottom: 10px;
    }
    .sub-text {
      font-size: 14px;
      font-weight: 300;
      color: rgba(28, 45, 84, 0.55);
    }
  </style>
</head>
<body>
  <h1 class="main-text">You have reached the limit to this version's public beta</h1>
  <h3 class="sub-text">Thank you for testing!</h3>
</body>
</html>
